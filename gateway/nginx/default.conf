resolver 127.0.0.11 ipv6=off valid=10s;

upstream frontend_app {
    zone frontend_app 64k;
    server frontend:3000 resolve;
}

upstream user_service_app {
    zone user_service_app 64k;
    server user_service:8001 resolve;
}

upstream product_service_app {
    zone product_service_app 64k;
    server product_service:8002 resolve;
}

upstream cart_service_app {
    zone cart_service_app 64k;
    server cart_service:8003 resolve;
}

upstream order_service_app {
    zone order_service_app 64k;
    server order_service:8004 resolve;
}

upstream payment_service_app {
    zone payment_service_app 64k;
    server payment_service:8005 resolve;
}

upstream shipping_service_app {
    zone shipping_service_app 64k;
    server shipping_service:8006 resolve;
}

upstream inventory_service_app {
    zone inventory_service_app 64k;
    server inventory_service:8007 resolve;
}

upstream ai_service_app {
    zone ai_service_app 64k;
    server ai_service:8008 resolve;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # CORS settings
    add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-User-ID,X-Admin' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health/ {
        return 200 "gateway-ok";
        add_header Content-Type text/plain;
    }

    location /user/ {
        proxy_pass http://user_service_app/;
    }

    location /product/ {
        proxy_pass http://product_service_app/;
    }

    location /cart/api/ {
        proxy_pass http://cart_service_app/api/;
    }

    location /cart/ {
        proxy_pass http://frontend_app;
    }

    location /order/ {
        proxy_pass http://order_service_app/;
    }

    location /payment/ {
        proxy_pass http://payment_service_app/;
    }

    location /shipping/ {
        proxy_pass http://shipping_service_app/;
    }

    location /inventory/ {
        proxy_pass http://inventory_service_app/;
    }

    location /ai/ {
        proxy_pass http://ai_service_app/;
    }

    location /_next/ {
        proxy_pass http://frontend_app/_next/;
    }

    location / {
        proxy_pass http://frontend_app/;
    }
}
