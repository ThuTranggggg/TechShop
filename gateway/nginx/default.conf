server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # CORS settings
    add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-User-ID,X-User-Role,X-Admin' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health/ {
        return 200 "gateway-ok";
        add_header Content-Type text/plain;
    }

    location /user/ {
        proxy_pass http://user_service:8001/;
    }

    location /product/ {
        proxy_pass http://product_service:8002/;
    }

    location /cart/ {
        proxy_pass http://cart_service:8003/;
    }

    location /order/ {
        proxy_pass http://order_service:8004/;
    }

    location /payment/ {
        proxy_pass http://payment_service:8005/;
    }

    location /shipping/ {
        proxy_pass http://shipping_service:8006/;
    }

    location /inventory/ {
        proxy_pass http://inventory_service:8007/;
    }

    location /ai/ {
        proxy_pass http://ai_service:8008/;
    }

    location /_next/ {
        proxy_pass http://frontend:3000/_next/;
    }

    location / {
        proxy_pass http://frontend:3000/;
    }
}
