name: techshop

x-service-base: &service-base
  restart: unless-stopped
  networks:
    - techshop_network
  depends_on:
    redis:
      condition: service_started
    neo4j:
      condition: service_started

services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./gateway/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - user_service
      - product_service
      - cart_service
      - order_service
      - payment_service
      - shipping_service
      - inventory_service
      - ai_service
    networks:
      - techshop_network

  frontend:
    build:
      context: ./frontend
      args:
        API_PROXY_BASE_URL: "http://gateway"
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: "/api/proxy"
      API_PROXY_BASE_URL: "http://gateway"
      NEXT_PUBLIC_APP_NAME: "TechShop"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - techshop_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - techshop_network

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:-neo4j/techshoppassword}"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - techshop_network

  user_service_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${USER_SERVICE_DB_NAME:-techshop_user_service}"
      POSTGRES_USER: "${USER_SERVICE_DB_USER:-techshop_user}"
      POSTGRES_PASSWORD: "${USER_SERVICE_DB_PASSWORD:-techshop_user_password}"
    ports:
      - "${USER_SERVICE_DB_PORT:-15433}:5432"
    volumes:
      - user_service_db_data:/var/lib/postgresql/data
    networks:
      - techshop_network

  product_service_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${PRODUCT_SERVICE_DB_NAME:-techshop_product_service}"
      POSTGRES_USER: "${PRODUCT_SERVICE_DB_USER:-techshop_product}"
      POSTGRES_PASSWORD: "${PRODUCT_SERVICE_DB_PASSWORD:-techshop_product_password}"
    ports:
      - "${PRODUCT_SERVICE_DB_PORT:-15434}:5432"
    volumes:
      - product_service_db_data:/var/lib/postgresql/data
    networks:
      - techshop_network

  cart_service_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${CART_SERVICE_DB_NAME:-techshop_cart_service}"
      POSTGRES_USER: "${CART_SERVICE_DB_USER:-techshop_cart}"
      POSTGRES_PASSWORD: "${CART_SERVICE_DB_PASSWORD:-techshop_cart_password}"
    ports:
      - "${CART_SERVICE_DB_PORT:-15435}:5432"
    volumes:
      - cart_service_db_data:/var/lib/postgresql/data
    networks:
      - techshop_network

  order_service_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${ORDER_SERVICE_DB_NAME:-techshop_order_service}"
      POSTGRES_USER: "${ORDER_SERVICE_DB_USER:-techshop_order}"
      POSTGRES_PASSWORD: "${ORDER_SERVICE_DB_PASSWORD:-techshop_order_password}"
    ports:
      - "${ORDER_SERVICE_DB_PORT:-15436}:5432"
    volumes:
      - order_service_db_data:/var/lib/postgresql/data
    networks:
      - techshop_network

  payment_service_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${PAYMENT_SERVICE_DB_NAME:-techshop_payment_service}"
      POSTGRES_USER: "${PAYMENT_SERVICE_DB_USER:-techshop_payment}"
      POSTGRES_PASSWORD: "${PAYMENT_SERVICE_DB_PASSWORD:-techshop_payment_password}"
    ports:
      - "${PAYMENT_SERVICE_DB_PORT:-15437}:5432"
    volumes:
      - payment_service_db_data:/var/lib/postgresql/data
    networks:
      - techshop_network

  shipping_service_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${SHIPPING_SERVICE_DB_NAME:-techshop_shipping_service}"
      POSTGRES_USER: "${SHIPPING_SERVICE_DB_USER:-techshop_shipping}"
      POSTGRES_PASSWORD: "${SHIPPING_SERVICE_DB_PASSWORD:-techshop_shipping_password}"
    ports:
      - "${SHIPPING_SERVICE_DB_PORT:-15438}:5432"
    volumes:
      - shipping_service_db_data:/var/lib/postgresql/data
    networks:
      - techshop_network

  inventory_service_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${INVENTORY_SERVICE_DB_NAME:-techshop_inventory_service}"
      POSTGRES_USER: "${INVENTORY_SERVICE_DB_USER:-techshop_inventory}"
      POSTGRES_PASSWORD: "${INVENTORY_SERVICE_DB_PASSWORD:-techshop_inventory_password}"
    ports:
      - "${INVENTORY_SERVICE_DB_PORT:-15439}:5432"
    volumes:
      - inventory_service_db_data:/var/lib/postgresql/data
    networks:
      - techshop_network

  ai_service_db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${AI_SERVICE_DB_NAME:-techshop_ai_service}"
      POSTGRES_USER: "${AI_SERVICE_DB_USER:-techshop_ai}"
      POSTGRES_PASSWORD: "${AI_SERVICE_DB_PASSWORD:-techshop_ai_password}"
    ports:
      - "${AI_SERVICE_DB_PORT:-15440}:5432"
    volumes:
      - ai_service_db_data:/var/lib/postgresql/data
    networks:
      - techshop_network

  user_service:
    <<: *service-base
    build: ./services/user_service
    command: sh -c "until nc -z $${DB_HOST} $${DB_PORT}; do echo 'Waiting for database...'; sleep 1; done; python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$${SERVICE_PORT:-8001} --workers 2 --timeout 120"
    env_file:
      - ./services/user_service/.env.example
    environment:
      DEBUG: "true"
      SECRET_KEY: "${USER_SERVICE_SECRET_KEY:-change-me-techshop-user-service}"
      ALLOWED_HOSTS: "localhost,127.0.0.1,user_service,gateway"
      DB_NAME: "${USER_SERVICE_DB_NAME:-techshop_user_service}"
      DB_USER: "${USER_SERVICE_DB_USER:-techshop_user}"
      DB_PASSWORD: "${USER_SERVICE_DB_PASSWORD:-techshop_user_password}"
      DB_HOST: "user_service_db"
      DB_PORT: "5432"
      SERVICE_PORT: "${USER_SERVICE_PORT:-8001}"
      SERVICE_NAME: "user_service"
    ports:
      - "${USER_SERVICE_PORT:-8001}:8001"
    volumes:
      - ./services/user_service:/app
    depends_on:
      user_service_db:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health/', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10

  product_service:
    <<: *service-base
    build: ./services/product_service
    command: sh -c "until nc -z $${DB_HOST} $${DB_PORT}; do echo 'Waiting for database...'; sleep 1; done; python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$${SERVICE_PORT:-8002} --workers 2 --timeout 120"
    env_file:
      - ./services/product_service/.env.example
    environment:
      DEBUG: "true"
      SECRET_KEY: "${PRODUCT_SERVICE_SECRET_KEY:-change-me-techshop-product-service}"
      ALLOWED_HOSTS: "localhost,127.0.0.1,product_service,gateway"
      DB_NAME: "${PRODUCT_SERVICE_DB_NAME:-techshop_product_service}"
      DB_USER: "${PRODUCT_SERVICE_DB_USER:-techshop_product}"
      DB_PASSWORD: "${PRODUCT_SERVICE_DB_PASSWORD:-techshop_product_password}"
      DB_HOST: "product_service_db"
      DB_PORT: "5432"
      SERVICE_PORT: "${PRODUCT_SERVICE_PORT:-8002}"
      SERVICE_NAME: "product_service"
      INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-internal-secret-key}"
    ports:
      - "${PRODUCT_SERVICE_PORT:-8002}:8002"
    volumes:
      - ./services/product_service:/app
    depends_on:
      product_service_db:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health/', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10

  cart_service:
    <<: *service-base
    build: ./services/cart_service
    command: sh -c "until nc -z $${DB_HOST} $${DB_PORT}; do echo 'Waiting for database...'; sleep 1; done; python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$${SERVICE_PORT:-8003} --workers 2 --timeout 120"
    env_file:
      - ./services/cart_service/.env.example
    environment:
      DEBUG: "true"
      SECRET_KEY: "${CART_SERVICE_SECRET_KEY:-change-me-techshop-cart-service}"
      ALLOWED_HOSTS: "localhost,127.0.0.1,cart_service,gateway"
      DB_NAME: "${CART_SERVICE_DB_NAME:-techshop_cart_service}"
      DB_USER: "${CART_SERVICE_DB_USER:-techshop_cart}"
      DB_PASSWORD: "${CART_SERVICE_DB_PASSWORD:-techshop_cart_password}"
      DB_HOST: "cart_service_db"
      DB_PORT: "5432"
      SERVICE_PORT: "${CART_SERVICE_PORT:-8003}"
      SERVICE_NAME: "cart_service"
      INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-internal-secret-key}"
    ports:
      - "${CART_SERVICE_PORT:-8003}:8003"
    volumes:
      - ./services/cart_service:/app
    depends_on:
      cart_service_db:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health/', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10

  order_service:
    <<: *service-base
    build: ./services/order_service
    command: sh -c "until nc -z $${DB_HOST} $${DB_PORT}; do echo 'Waiting for database...'; sleep 1; done; python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$${SERVICE_PORT:-8004} --workers 2 --timeout 120"
    env_file:
      - ./services/order_service/.env.example
    environment:
      DEBUG: "true"
      SECRET_KEY: "${ORDER_SERVICE_SECRET_KEY:-change-me-techshop-order-service}"
      ALLOWED_HOSTS: "localhost,127.0.0.1,order_service,gateway"
      PRODUCT_SERVICE_URL: "http://gateway/product"
      CART_SERVICE_URL: "http://gateway/cart"
      USER_SERVICE_URL: "http://gateway/user"
      INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-internal-secret-key}"
      DB_NAME: "${ORDER_SERVICE_DB_NAME:-techshop_order_service}"
      DB_USER: "${ORDER_SERVICE_DB_USER:-techshop_order}"
      DB_PASSWORD: "${ORDER_SERVICE_DB_PASSWORD:-techshop_order_password}"
      DB_HOST: "order_service_db"
      DB_PORT: "5432"
      SERVICE_PORT: "${ORDER_SERVICE_PORT:-8004}"
      SERVICE_NAME: "order_service"
    ports:
      - "${ORDER_SERVICE_PORT:-8004}:8004"
    volumes:
      - ./services/order_service:/app
    depends_on:
      order_service_db:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health/', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10

  payment_service:
    <<: *service-base
    build: ./services/payment_service
    command: sh -c "until nc -z $${DB_HOST} $${DB_PORT}; do echo 'Waiting for database...'; sleep 1; done; python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$${SERVICE_PORT:-8005} --workers 2 --timeout 120"
    env_file:
      - ./services/payment_service/.env.example
    environment:
      DEBUG: "true"
      SECRET_KEY: "${PAYMENT_SERVICE_SECRET_KEY:-change-me-techshop-payment-service}"
      ALLOWED_HOSTS: "localhost,127.0.0.1,payment_service,gateway"
      DB_NAME: "${PAYMENT_SERVICE_DB_NAME:-techshop_payment_service}"
      DB_USER: "${PAYMENT_SERVICE_DB_USER:-techshop_payment}"
      DB_PASSWORD: "${PAYMENT_SERVICE_DB_PASSWORD:-techshop_payment_password}"
      DB_HOST: "payment_service_db"
      DB_PORT: "5432"
      SERVICE_PORT: "${PAYMENT_SERVICE_PORT:-8005}"
      SERVICE_NAME: "payment_service"
    ports:
      - "${PAYMENT_SERVICE_PORT:-8005}:8005"
    volumes:
      - ./services/payment_service:/app
    depends_on:
      payment_service_db:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/health/', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10

  shipping_service:
    <<: *service-base
    build: ./services/shipping_service
    command: sh -c "until nc -z $${DB_HOST} $${DB_PORT}; do echo 'Waiting for database...'; sleep 1; done; python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$${SERVICE_PORT:-8006} --workers 2 --timeout 120"
    env_file:
      - ./services/shipping_service/.env.example
    environment:
      DEBUG: "true"
      SECRET_KEY: "${SHIPPING_SERVICE_SECRET_KEY:-change-me-techshop-shipping-service}"
      ALLOWED_HOSTS: "localhost,127.0.0.1,shipping_service,gateway"
      DB_NAME: "${SHIPPING_SERVICE_DB_NAME:-techshop_shipping_service}"
      DB_USER: "${SHIPPING_SERVICE_DB_USER:-techshop_shipping}"
      DB_PASSWORD: "${SHIPPING_SERVICE_DB_PASSWORD:-techshop_shipping_password}"
      DB_HOST: "shipping_service_db"
      DB_PORT: "5432"
      SERVICE_PORT: "${SHIPPING_SERVICE_PORT:-8006}"
      SERVICE_NAME: "shipping_service"
    ports:
      - "${SHIPPING_SERVICE_PORT:-8006}:8006"
    volumes:
      - ./services/shipping_service:/app
    depends_on:
      shipping_service_db:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8006/health/', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10

  inventory_service:
    <<: *service-base
    build: ./services/inventory_service
    command: sh -c "until nc -z $${DB_HOST} $${DB_PORT}; do echo 'Waiting for database...'; sleep 1; done; python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$${SERVICE_PORT:-8007} --workers 2 --timeout 120"
    env_file:
      - ./services/inventory_service/.env.example
    environment:
      DEBUG: "true"
      SECRET_KEY: "${INVENTORY_SERVICE_SECRET_KEY:-change-me-techshop-inventory-service}"
      ALLOWED_HOSTS: "localhost,127.0.0.1,inventory_service,gateway"
      DB_NAME: "${INVENTORY_SERVICE_DB_NAME:-techshop_inventory_service}"
      DB_USER: "${INVENTORY_SERVICE_DB_USER:-techshop_inventory}"
      DB_PASSWORD: "${INVENTORY_SERVICE_DB_PASSWORD:-techshop_inventory_password}"
      DB_HOST: "inventory_service_db"
      DB_PORT: "5432"
      SERVICE_PORT: "${INVENTORY_SERVICE_PORT:-8007}"
      SERVICE_NAME: "inventory_service"
      INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-internal-secret-key}"
    ports:
      - "${INVENTORY_SERVICE_PORT:-8007}:8007"
    volumes:
      - ./services/inventory_service:/app
    depends_on:
      inventory_service_db:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8007/health/', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10

  ai_service:
    <<: *service-base
    build: ./services/ai_service
    command: sh -c "until nc -z $${DB_HOST} $${DB_PORT}; do echo 'Waiting for database...'; sleep 1; done; python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$${SERVICE_PORT:-8008} --workers 2 --timeout 120"
    env_file:
      - ./services/ai_service/.env.example
    environment:
      DEBUG: "true"
      SECRET_KEY: "${AI_SERVICE_SECRET_KEY:-change-me-techshop-ai-service}"
      ALLOWED_HOSTS: "localhost,127.0.0.1,ai_service,gateway"
      DB_NAME: "${AI_SERVICE_DB_NAME:-techshop_ai_service}"
      DB_USER: "${AI_SERVICE_DB_USER:-techshop_ai}"
      DB_PASSWORD: "${AI_SERVICE_DB_PASSWORD:-techshop_ai_password}"
      DB_HOST: "ai_service_db"
      DB_PORT: "5432"
      SERVICE_PORT: "${AI_SERVICE_PORT:-8008}"
      SERVICE_NAME: "ai_service"
      REDIS_URL: "redis://redis:6379/0"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "techshoppassword"
      INTERNAL_SERVICE_KEY: "${INTERNAL_SERVICE_KEY:-internal-secret-key}"
      PRODUCT_SERVICE_URL: "http://gateway/product"
      AI_PROVIDER: "${AI_PROVIDER:-yescale}"
      AI_API_BASE_URL: "${AI_API_BASE_URL:-https://api.yescale.io/v1}"
      AI_CHAT_COMPLETIONS_URL: "${AI_CHAT_COMPLETIONS_URL:-https://api.yescale.io/v1/chat/completions}"
      AI_EMBEDDINGS_URL: "${AI_EMBEDDINGS_URL:-https://api.yescale.io/v1/embeddings}"
      AI_API_KEY: "${AI_API_KEY:-}"
      AI_CHAT_MODEL: "${AI_CHAT_MODEL:-gpt-5.4-nano}"
      AI_EMBEDDING_MODEL: "${AI_EMBEDDING_MODEL:-text-embedding-3-small}"
      AI_EMBEDDING_DIMENSIONS: "${AI_EMBEDDING_DIMENSIONS:-1536}"
    ports:
      - "${AI_SERVICE_PORT:-8008}:8008"
    volumes:
      - ./services/ai_service:/app
    depends_on:
      ai_service_db:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8008/health/', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10

networks:
  techshop_network:
    driver: bridge

volumes:
  neo4j_data:
  user_service_db_data:
  product_service_db_data:
  cart_service_db_data:
  order_service_db_data:
  payment_service_db_data:
  shipping_service_db_data:
  inventory_service_db_data:
  ai_service_db_data:
